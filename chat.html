<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة مع الملك ضياء 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Reem+Kufi:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05050a;
            --gold: #ffd700;
            --user-msg: #1a1a1a;
            --diaa-msg: #8b0000;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: var(--bg-color);
            color: white; font-family: 'Amiri', serif;
            overflow: hidden; position: fixed;
        }

        /* --- شاشة القفل --- */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s ease-in-out;
        }
        .lock-box { text-align: center; width: 85%; max-width: 400px; }
        .lock-box h1 { color: var(--gold); font-family: 'Reem Kufi'; font-size: 1.5rem; margin-bottom: 20px; }
        .lock-input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--gold);
            color: white; padding: 12px; border-radius: 8px;
            width: 100%; text-align: center; font-family: 'Amiri';
            font-size: 1.1rem; outline: none; margin-bottom: 15px; box-sizing: border-box;
        }
        .remember-container {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 20px; color: #ccc; font-size: 0.9rem; cursor: pointer;
        }
        .remember-container input { display: none; }
        .checkmark {
            width: 18px; height: 18px; border: 1px solid var(--gold);
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
        }
        .remember-container input:checked + .checkmark { background: var(--gold); }
        .remember-container input:checked + .checkmark::after { content: '✓'; color: black; font-weight: bold; }
        .lock-btn {
            background: var(--gold); color: black; border: none;
            padding: 12px 40px; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-family: 'Reem Kufi';
        }

        #sky-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            height: 100vh; filter: blur(15px); transition: 0.8s filter ease;
        }

        .chat-header {
            background: rgba(10, 10, 20, 0.98); border-bottom: 1px solid var(--gold);
            padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gold); background: #222; display: flex; align-items: center; justify-content: center; }
        .status-info h2 { margin: 0; font-family: 'Reem Kufi'; font-size: 0.9rem; color: var(--gold); }
        .status-info span { font-size: 0.65rem; color: #4CAF50; }
        .header-right { display: flex; gap: 10px; }
        .clear-btn { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
        .logout-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 3px 8px; border-radius: 5px; cursor: pointer; }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 12px;
            display: flex; flex-direction: column; gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-container::-webkit-scrollbar { display: none; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 12px; font-size: 0.95rem; animation: fadeIn 0.3s ease; line-height: 1.4; }
        .msg-diaa { align-self: flex-start; background: var(--diaa-msg); border-bottom-right-radius: 2px; }
        .msg-user { align-self: flex-end; background: var(--user-msg); border: 1px solid #333; border-bottom-left-radius: 2px; }

        .options-footer {
            background: rgba(10, 10, 20, 0.98); border-top: 1px solid var(--gold);
            padding: 10px; flex-shrink: 0; 
            max-height: 250px; overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-bottom: 10px; }
        .opt-btn {
            background: #111; border: 1px solid rgba(255, 215, 0, 0.3);
            color: white; padding: 12px 5px; border-radius: 8px;
            font-family: 'Amiri'; font-size: 0.85rem; text-align: center;
        }
        .typing { font-style: italic; font-size: 0.75rem; color: #aaa; height: 18px; margin-bottom: 5px; display: none; }

        .footer-banner { grid-column: span 2; background: rgba(255, 215, 0, 0.05); border: 1px dashed var(--gold); color: var(--gold); text-align: center; padding: 10px; font-size: 0.8rem; border-radius: 8px; margin-top: 5px; }
        .footer-line { grid-column: span 2; text-align: center; color: var(--gold); padding: 5px; font-size: 1.2rem; opacity: 0.5; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h1>أثبتي إنكِ الملكة 👑</h1>
            <input type="text" id="passInput" class="lock-input" placeholder="اكتبي كلمة السر الملكية...">
            <label class="remember-container">
                <input type="checkbox" id="rememberMe">
                <div class="checkmark"></div>
                <span>تذكريني لمدة 24 ساعة</span>
            </label>
            <button class="lock-btn" onclick="checkPass()">دخول للمملكة</button>
            <div id="errorMsg" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 10px; display: none;">الكلمة غلط يا حبيبتي ❤️</div>
        </div>
    </div>

    <canvas id="sky-canvas"></canvas>

    <div class="main-wrapper" id="content">
        <div class="chat-header">
            <div class="header-left">
                <div class="avatar">👑</div>
                <div class="status-info">
                    <h2>ضياء جوزي 🥹🌝</h2>
                    <span>متصل الآن..</span>
                </div>
            </div>
            <div class="header-right">
                <button class="clear-btn" onclick="clearChat()">مسح</button>
                <button class="logout-btn" onclick="confirmLogout()">➔</button>
            </div>
        </div>

        <div class="chat-container" id="chat-box">
            <div class="message msg-diaa">أهلاً يا ست البنات.. وحشتيني يا قلب ضياء ❤️</div>
        </div>

        <div class="options-footer" id="scroll-area">
            <div id="typing-indicator" class="typing">ضياء يكتب الآن...</div>
            <div class="options-grid" id="options-list"></div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const lastLogin = localStorage.getItem('diaa_login_time');
            if (lastLogin && (new Date().getTime() - lastLogin < 86400000)) unlockApp();
        };

        function unlockApp() {
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('content').style.filter = 'blur(0)';
            }, 800);
        }

        function checkPass() {
            let pass = document.getElementById('passInput').value.trim().replace(/أ/g, "ا");
            if (pass === "احبك يا ضياء") {
                if (document.getElementById('rememberMe').checked) localStorage.setItem('diaa_login_time', new Date().getTime());
                unlockApp();
            } else { document.getElementById('errorMsg').style.display = 'block'; }
        }

        function confirmLogout() { if (confirm("تسجيل خروج؟")) { localStorage.removeItem('diaa_login_time'); location.reload(); } }

        const canvas = document.getElementById('sky-canvas');
        const ctx = canvas.getContext('2d');
        function initStars() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        initStars();
        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white";
            for(let i=0; i<40; i++) { ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 0.6, 0, Math.PI*2); ctx.fill(); }
            setTimeout(() => requestAnimationFrame(drawStars), 300);
