<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كروت الحب الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Reem+Kufi:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --royal-red: #a30000;
            --gold-color: #ffd700;
            --card-bg-red: #4a0000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Amiri', serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: white; position: relative;
            overflow-x: hidden;
        }

        #top-back-arrow {
            position: absolute; top: 20px; right: 20px;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(45deg, #a30000, #cc0000);
            border: 2px solid var(--gold-color);
            border-radius: 50%; color: white;
            text-decoration: none; z-index: 2000;
            font-size: 2rem; font-weight: 900;
            cursor: pointer;
        }

        .header-section { text-align: center; padding: 30px 15px; z-index: 10; padding-top: 80px; }
        .header-section h1 { color: var(--gold-color); font-family: 'Reem Kufi', sans-serif; font-size: 2.2rem; margin: 0; }

        .cards-grid { width: 95%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; z-index: 10; padding-bottom: 40px; }

        .flip-card { background: transparent; width: 100%; height: 160px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        
        /* حالة القلب */
        .flipped .flip-card-inner { transform: rotateY(180deg); }

        .front, .back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .front { 
            background: rgba(255, 215, 0, 0.05); 
            border: 2px solid var(--gold-color); 
            color: var(--gold-color); 
            z-index: 2;
        }

        .back { 
            background: var(--card-bg-red); 
            border: 2px solid var(--gold-color); 
            color: var(--gold-color); 
            transform: rotateY(180deg); 
            z-index: 1;
        }

        .back p {
            margin: 0;
            font-size: 1.1rem;
            line-height: 1.4;
            text-align: center;
            font-weight: bold;
        }

        .heart-fall { position: fixed; top: -10%; color: rgba(255, 0, 0, 0.5); font-size: 18px; pointer-events: none; animation: falling linear infinite; z-index: 0; }
        @keyframes falling { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <a href="javascript:void(0);" onclick="history.back();" id="top-back-arrow"><span>←</span></a>

    <div class="header-section">
        <h1>كروت الحب يا ست البنات</h1>
        <p>اضغطي على الكارت لتري الرسالة 💖</p>
    </div>

    <div class="cards-grid" id="container"></div>

    <script>
        const messages = [
            "وعد ليكي يا مراتي، نفضل سوا في المرة قبل الحلوة، ودايماً إيدنا في إيد بعض للأبد.",
            "وجودك جنبي يابنوتي بيخلي كل حاجه بخير ، حتا انا",
            "‏:إن سالوني يوماً عن كل ما هو جميل في حياتي ساكتفي بذكرك انتي وبس يا بنوتي",
            "بصي يابطه هفضل وراكي وراكي لحد ما يجي اليوم الي تقوليلي فيه هات فينو معاك وانت جاي😂",
            "أحبك وكانني لم اكتسب من الحياة غيرك",
            "سأكون لكي أبا حين يخذلك العالم وأخا حين تضيق بك الايام وعاشقا لا يرى في النساء سواكي يا مني❤️",
            "أنتي أغلى ما أملك يا منى، ربنا يخليكي ليا يا ست البنات.",
            "يا بنوتي الكبيرة، ضحكتك هي اللي بتنور دنيتي وتخليني مبسوط دايماً.",
            "أنتي مش بس خطيبتي، أنتي مراتي وشريكة عمري اللي حلمت بيها طول حياتي.",
            "يا قلب بابا من جوه، هفضل سندك وضهرك طول العمر يا منى يا غالية.",
            "كل يوم بيعدي بتأكد إنك أجمل اختيار اخترته في حياتي يا مراتي المستقبلية.",
            "منى.. أنتي الروح اللي برد فيها لما بكون تعبان، بحبك جداً يا بنوتي.",
            "يا ست البنات، جمالك ملوش زي وقلبك أبيض من اللبن.. ربنا يحفظك ليا من كل شر.",
            "مهما شفت في الدنيا، هتفضلي أنتي الملكة المتربعة على عرش قلبي يا منى.",
            "أنتي قلب بابا اللي بيدق، مفيش حاجة في الدنيا تغلى عليكي يا روحي.",
            "يا مراتي اللي جاية، بيتنا الجاي هيكون أجمل مملكة في الدنيا عشان أنتي فيها.",
            "يا منى، وجودك في حياتي هو أكبر نعمة من ربنا بشكره عليها في كل سجدة.",
            "بنوتي الشقية، هفضل أدلعك لآخر يوم في عمري يا ست البنات كلهم.",
            "أنتي السكن والسكينة، أنتي منى اللي قلبي اختارها من وسط العالم كله.",
            "يا مراتي وحلالي، وعد مني أكون ليكي الأب والأخ الحبيب والصديق المخلص.",
            "قلب بابا مش بيحب حد قدك، أنتي بنوتي المدللة وست البنات اللي مفيش زيهم.",
            "لو كانت النجوم تتكلّم لكنت أرسلت مع كل نجمة كلمة أحبّك",
            "أشهد أنّ لا امرأة تعاملت معي كطفل عمره شهران إلا أنتِ",
            "لو كنت أملك أن أهديك عمري لسجّلت أيّامي باسمك",
            "أنتِ ليس فقط حبيبة حياتي، بل أنتِ سر سعادتي وبقائي في هذا العالم.",
            "أكبر فخر للسما إنك قمرها، أكبر فخر للحب إنك تعرفه",
            "يا منى.. أنتي الصدق الوحيد في عالم مليان كذب، بحبك يا أغلى الناس على قلبي.",
            "أنتي مش بس شريكة عمري، أنتي مراتي وحبيبتي وأم ولادي في المستقبل بإذن الله.",
            "يا بنوتي الصغيرة، مهما كبرتي هتفضلي في عيني الطفلة اللي بخاف عليها من الهوا.",
            "يا ست البنات يا منى، مفيش كلام يوصف غلاوتك في قلبي يا قلب بابا الحنين."
        ];

        function init() {
            const container = document.getElementById('container');
            // تم مسح المصفوفة القديمة لضمان عدم التكرار
            container.innerHTML = ""; 
            messages.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'flip-card';
                card.onclick = function() {
                    this.classList.toggle('flipped');
                };
                card.innerHTML = `
                    <div class="flip-card-inner">
                        <div class="front">
                            <span style="font-size: 2rem;">🎁</span>
                            <h3 style="margin-top:10px;">كارت الحب ${i+1}</h3>
                        </div>
                        <div class="back">
                            <p>${m}</p>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        // استدعاء الوظيفة فور تحميل الصفحة
        window.addEventListener('DOMContentLoaded', init);

        // وظيفة القلوب المتساقطة
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('heart-fall'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 8000);
        }, 400);
    </script>
</body>
</html>
